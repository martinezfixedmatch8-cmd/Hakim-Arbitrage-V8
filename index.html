<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAKIM AI | Quantum Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary: #FFD700;
            --bg: #05070a;
            --card: #141923;
            --text-gray: #8a92a3;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,215,0,0.1);
        }

        .card h2 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #0a0c10;
            border: 1px solid #2a2e38;
            color: white;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--primary), #ffaa00);
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,215,0,0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .hidden {
            display: none;
        }

        #balanceDisplay {
            color: var(--primary);
            font-size: 2.5rem;
            margin: 15px 0;
            text-align: center;
        }

        .switch-link {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: var(--text-gray);
            cursor: pointer;
        }

        .switch-link span {
            color: var(--primary);
        }

        hr {
            border: 0.5px solid #2a2e38;
            margin: 20px 0;
        }

        .info-text {
            font-size: 11px;
            color: var(--text-gray);
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- LOGIN/REGISTER BOX -->
    <div id="authBox" class="card">
        <h2 id="authTitle">🔐 Login to Hakim AI</h2>
        <input type="email" id="email" class="input-field" placeholder="Email Address">
        <input type="password" id="password" class="input-field" placeholder="Password">
        <button class="btn" onclick="handleAuth()">Continue</button>
        <div class="switch-link" onclick="toggleAuth()">
            <span id="toggleText">Create new account</span>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="card hidden">
        <h2>👋 Welcome, <span id="userName">User</span></h2>
        <div id="balanceDisplay">$0.00 USDT</div>
        <hr>
        <h3 style="margin-bottom: 15px;">💰 Deposit Funds</h3>
        <p style="font-size: 12px; color: var(--text-gray); margin-bottom: 10px;">Minimum deposit: <strong>$30 USDT (BEP20)</strong></p>
        <input type="number" id="depAmount" class="input-field" placeholder="Amount (USDT)">
        <button class="btn" id="depBtn" onclick="depositNow()">
            <i class="fas fa-rocket"></i> Deposit with NOWPayments
        </button>
        <button class="btn btn-outline" onclick="logout()" style="margin-top: 15px;">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
        <div class="info-text">
            <i class="fas fa-lock"></i> Secure payments powered by NOWPayments
        </div>
    </div>

    <script>
        const API_URL = "https://hakim-arbitrage-v8.up.railway.app";
        let currentUser = null;
        let isLogin = true;

        function toggleAuth() {
            isLogin = !isLogin;
            const title = document.getElementById('authTitle');
            const toggleText = document.getElementById('toggleText');
            
            if (isLogin) {
                title.innerHTML = '🔐 Login to Hakim AI';
                toggleText.innerHTML = 'Create new account';
            } else {
                title.innerHTML = '📝 Create Account';
                toggleText.innerHTML = 'Back to Login';
            }
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = email.split('@')[0];
            
            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }
            
            const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
            
            try {
                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    if (isLogin) {
                        currentUser = data.user;
                        showDashboard();
                    } else {
                        alert('✅ Account created! Please login.');
                        toggleAuth();
                        document.getElementById('password').value = '';
                    }
                } else {
                    alert(data.message || 'Authentication failed');
                }
            } catch (err) {
                alert('Error connecting to server');
            }
        }

        function showDashboard() {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('balanceDisplay').innerText = `$${currentUser.balance.toFixed(2)} USDT`;
        }

        async function depositNow() {
            if (!currentUser) {
                alert('Please login first');
                return;
            }
            
            const amount = parseFloat(document.getElementById('depAmount').value);
            
            if (!amount || amount < 30) {
                alert('Minimum deposit is $30 USDT');
                return;
            }
            
            const btn = document.getElementById('depBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;
            
            try {
                const res = await fetch(API_URL + '/api/create-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, userId: currentUser._id })
                });
                
                const data = await res.json();
                
                if (data.success && data.payment_url) {
                    window.open(data.payment_url, '_blank');
                    alert(`✅ Payment created! Complete payment in the new window.\n\nAmount: $${amount}\n\nFunds will be auto-credited after confirmation.`);
                    document.getElementById('depAmount').value = '';
                } else {
                    alert('❌ Failed to create payment: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                console.error(err);
                alert('Error connecting to payment gateway');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function refreshBalance() {
            if (!currentUser) return;
            try {
                const res = await fetch(`${API_URL}/api/user/${currentUser._id}`);
                const data = await res.json();
                if (data.success) {
                    currentUser.balance = data.user.balance;
                    document.getElementById('balanceDisplay').innerText = `$${currentUser.balance.toFixed(2)} USDT`;
                }
            } catch (err) {
                console.error(err);
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('authBox').classList.remove('hidden');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('depAmount').value = '';
        }

        // Refresh balance every 10 seconds if logged in
        setInterval(() => {
            if (currentUser) refreshBalance();
        }, 10000);
    </script>
</body>
</html>
